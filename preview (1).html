<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rat Game</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  background:#87c7ff;
}

#game{
  width:100vw;
  height:360px;
  position:relative;
  overflow:hidden;
  background:linear-gradient(#7ec8ff,#eaf6ff);
}

/* ☁️ CLOUDS */
.cloud{
  position:absolute;
  top:40px;
  font-size:30px;
  opacity:0.85;
  animation:cloudMove linear infinite;
}

@keyframes cloudMove{
  from{transform:translateX(110vw);}
  to{transform:translateX(-30vw);}
}

/* 🌍 GROUND */
#ground{
  position:absolute;
  bottom:0;
  width:100%;
  height:80px;
  background:linear-gradient(#5a3d1e,#3b2916);
  overflow:hidden;
}

#ground::after{
  content:"";
  position:absolute;
  top:0;
  width:200%;
  height:100%;
  background:repeating-linear-gradient(
    45deg,
    rgba(0,0,0,0.15),
    rgba(0,0,0,0.15) 10px,
    rgba(255,255,255,0.05) 10px,
    rgba(255,255,255,0.05) 20px
  );
  animation:groundMove 2s linear infinite;
}

@keyframes groundMove{
  from{transform:translateX(0);}
  to{transform:translateX(-50%);}
}

/* 🐀 PLAYER */
#rat{
  position:absolute;
  left:60px;
  bottom:80px;
  font-size:52px;
}

/* 🌵 OBSTACLES */
.obstacle{
  position:absolute;
  bottom:80px;
  font-size:50px;
}

/* SCORE */
#score{
  position:absolute;
  top:10px;
  left:10px;
  font-size:22px;
  color:white;
  text-shadow:1px 1px 3px black;
}

/* RESTART */
#restart{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  padding:10px 20px;
  display:none;
}

/* FREEZE */
.paused *{
  animation-play-state: paused !important;
}
</style>
</head>

<body>

<div id="game">

  <div class="cloud" style="top:30px; animation-duration:18s;">☁️</div>
  <div class="cloud" style="top:60px; animation-duration:24s;">☁️</div>
  <div class="cloud" style="top:90px; animation-duration:20s;">☁️</div>

  <div id="score">0</div>
  <div id="rat">🐀</div>
  <button id="restart">RESTART</button>

  <div id="ground"></div>
</div>

<script>
const rat = document.getElementById("rat");
const scoreEl = document.getElementById("score");
const restart = document.getElementById("restart");
const game = document.getElementById("game");

let score = 0;
let velocity = 0;
let gravity = 0.9;
let jumpPower = 17;
let y = 0;
let onGround = true;

let speed = 10; // ⚡ rychlejší start
let obstacles = [];
let running = true;

/* JUMP */
function jump(){
  if(onGround && running){
    velocity = jumpPower;
    onGround = false;
  }
}

document.addEventListener("keydown", jump);
document.addEventListener("touchstart", jump);
document.addEventListener("click", jump);

/* RESTART */
restart.onclick = () => location.reload();

/* SPAWN */
function spawn(){
  if(!running) return;

  const o = document.createElement("div");
  o.className = "obstacle";
  o.innerText = "🌵";
  o.style.left = window.innerWidth + "px";

  game.appendChild(o);
  obstacles.push(o);

  setTimeout(spawn, 1000 + Math.random()*1000);
}

/* GAME OVER */
function gameOver(){
  running = false;
  game.classList.add("paused");
  restart.style.display = "block";
}

/* LOOP */
function loop(){
  if(!running) return;

  /* physics */
  velocity -= gravity;
  y += velocity;

  if(y <= 0){
    y = 0;
    velocity = 0;
    onGround = true;
  }

  rat.style.bottom = (80 + y) + "px";

  /* obstacles */
  obstacles.forEach((o, i) => {
    let x = parseFloat(o.style.left);
    x -= speed;
    o.style.left = x + "px";

    if(x < -80){
      o.remove();
      obstacles.splice(i, 1);
    }

    const r = rat.getBoundingClientRect();
    const b = o.getBoundingClientRect();

    if(r.right > b.left && r.left < b.right && r.bottom > b.top){
      gameOver();
    }
  });

  score++;
  scoreEl.innerText = score;

  // ⚡ plynulé zrychlování
  if(speed < 16){
    speed += 0.002;
  }

  requestAnimationFrame(loop);
}

spawn();
loop();
</script>

</body>
</html>
