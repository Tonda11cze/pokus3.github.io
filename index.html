<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rat Game</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#f7f7f7;
    font-family:Arial;
}

#game{
    width:100vw;
    height:300px;
    border-bottom:4px solid black;
    position:relative;
    overflow:hidden;
}

#rat{
    width:60px;
    height:60px;
    position:absolute;
    bottom:0;
    left:50px;
    font-size:50px;
}

#obstacle{
    width:40px;
    height:40px;
    position:absolute;
    bottom:0;
    right:-40px;
    background:black;
    animation:move 2s linear infinite;
}

@keyframes move{
    from{
        right:-40px;
    }
    to{
        right:100%;
    }
}

.jump{
    animation:jump 0.6s;
}

@keyframes jump{
    0%{bottom:0;}
    50%{bottom:120px;}
    100%{bottom:0;}
}

#score{
    position:absolute;
    top:20px;
    right:20px;
    font-size:30px;
}
</style>
</head>

<body>

<div id="game">
    <div id="score">0</div>
    <div id="rat">🐀</div>
    <div id="obstacle"></div>
</div>

<script>
const rat = document.getElementById("rat");
const obstacle = document.getElementById("obstacle");
const scoreEl = document.getElementById("score");

let score = 0;

function jump(){
    if(!rat.classList.contains("jump")){
        rat.classList.add("jump");

        setTimeout(()=>{
            rat.classList.remove("jump");
        },600);
    }
}

document.addEventListener("keydown", jump);
document.addEventListener("touchstart", jump);

setInterval(()=>{
    let ratBottom = parseInt(window.getComputedStyle(rat).getPropertyValue("bottom"));
    let obstacleLeft = obstacle.getBoundingClientRect().left;

    if(obstacleLeft < 110 && obstacleLeft > 40 && ratBottom < 50){
        alert("Game Over! Score: " + score);
        location.reload();
    }

    score++;
    scoreEl.innerText = score;
},100);
</script>

</body>
</html>
